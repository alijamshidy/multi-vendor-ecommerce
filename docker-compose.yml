services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_MARKETPLACE_API_URL: ${NEXT_PUBLIC_MARKETPLACE_API_URL:-http://localhost:5000}
        NEXT_PUBLIC_WEBSITE_URL: ${NEXT_PUBLIC_WEBSITE_URL:-http://localhost:3002}
    restart: unless-stopped
    ports:
      - "${PORT:-3002}:3000"
    environment:
      MARKETPLACE_API_URL: http://host.docker.internal:5000
      NEXT_PUBLIC_MARKETPLACE_API_URL: ${NEXT_PUBLIC_MARKETPLACE_API_URL:-http://localhost:5000}
      NEXT_PUBLIC_WEBSITE_URL: ${NEXT_PUBLIC_WEBSITE_URL:-http://localhost:3002}
    extra_hosts:
      - "host.docker.internal:host-gateway"
